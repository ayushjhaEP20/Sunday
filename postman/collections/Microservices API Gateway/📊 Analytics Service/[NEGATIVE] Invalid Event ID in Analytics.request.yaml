$kind: http-request
url: "{{baseUrl}}/api/v1/analytics/events/INVALID-EVENT-ID-000"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 404 Not Found", () => pm.response.to.have.status(404));
      pm.test("Not found error returned", () => {
        pm.expect(pm.response.json().error).to.match(/not found|invalid/i);
      });
    language: text/javascript
order: 7000
