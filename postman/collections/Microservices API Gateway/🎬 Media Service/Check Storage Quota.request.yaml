$kind: http-request
url: "{{baseUrl}}/api/v1/media/quota?userId={{userId}}"
method: GET
headers:
  Content-Type: application/json
queryParams:
  userId: "{{userId}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Quota info returned", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("usedBytes");
        pm.expect(json).to.have.property("limitBytes");
        pm.expect(json.usedBytes).to.be.a("number");
      });
    language: text/javascript
order: 4000
