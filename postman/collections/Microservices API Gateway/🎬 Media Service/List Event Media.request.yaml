$kind: http-request
url: "{{baseUrl}}/api/v1/media/assets?eventId={{eventId}}&type=video"
method: GET
headers:
  Content-Type: application/json
queryParams:
  eventId: "{{eventId}}"
  type: video
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Assets array returned", () => {
        pm.expect(pm.response.json().assets).to.be.an("array");
      });
    language: text/javascript
order: 3000
