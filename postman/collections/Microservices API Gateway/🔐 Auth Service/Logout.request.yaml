$kind: http-request
url: "{{baseUrl}}/api/v1/auth/logout"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Logout message present", () => {
        const json = pm.response.json();
        pm.expect(json.message).to.include("logged out");
      });
    language: text/javascript
order: 5000
