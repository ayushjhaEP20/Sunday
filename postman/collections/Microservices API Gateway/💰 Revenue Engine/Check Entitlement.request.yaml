$kind: http-request
url: "{{baseUrl}}/api/v1/revenue/entitlements/{{entitlementId}}/check?eventId={\
  {eventId}}"
method: GET
headers:
  Content-Type: application/json
queryParams:
  eventId: "{{eventId}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Entitlement check result present", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("hasAccess");
        pm.expect(json.hasAccess).to.be.a("boolean");
      });
    language: text/javascript
order: 6000
