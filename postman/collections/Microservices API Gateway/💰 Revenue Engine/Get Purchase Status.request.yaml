$kind: http-request
url: "{{baseUrl}}/api/v1/revenue/purchases/{{purchaseId}}"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));

      pm.test("Purchase details returned", () => {
        const json = pm.response.json();
        pm.expect(json.purchaseId).to.eql(pm.collectionVariables.get("purchaseId"));
      });
    language: text/javascript
order: 4000
