$kind: http-request
url: "{{baseUrl}}/api/v1/revenue/entitlements?userId={{userId}}"
method: GET
headers:
  Content-Type: application/json
queryParams:
  userId: "{{userId}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));

      pm.test("Entitlements array returned", () => {
        const json = pm.response.json();
        pm.expect(json.entitlements).to.be.an("array");
        if (json.entitlements.length > 0) {
          pm.collectionVariables.set("entitlementId", json.entitlements[0].entitlementId);
        }
      });
    language: text/javascript
order: 5000
