$kind: http-request
url: "{{baseUrl}}/api/v1/events?page=1&limit=10&type=conference"
method: GET
headers:
  Content-Type: application/json
queryParams:
  page: "1"
  limit: "10"
  type: conference
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Returns array of events", () => {
        const json = pm.response.json();
        pm.expect(json.events).to.be.an("array");
        pm.expect(json).to.have.property("total");
      });
    language: text/javascript
order: 2000
