$kind: http-request
url: "{{baseUrl}}/api/v1/events/{{eventId}}/stream/start"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "quality": "1080p",
      "protocol": "RTMP",
      "recordingEnabled": true
    }
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Stream ID saved", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("streamId");
        pm.collectionVariables.set("streamId", json.streamId);
      });
      pm.test("Stream URL present", () => {
        pm.expect(pm.response.json().streamUrl).to.be.a("string");
      });
    language: text/javascript
order: 8000
