$kind: http-request
url: "{{baseUrl}}/api/v1/events/{{eventId}}"
method: DELETE
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: pm.test("Status is 204 No Content", () => pm.response.to.have.status(204));
    language: text/javascript
order: 10000
