$kind: http-request
url: "{{baseUrl}}/api/v1/events/{{eventId}}/participants"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Participants list returned", () => {
        pm.expect(pm.response.json().participants).to.be.an("array");
      });
    language: text/javascript
order: 7000
