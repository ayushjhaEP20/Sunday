$kind: http-request
url: "{{baseUrl}}/api/v1/events/{{eventId}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "capacity": 750,
      "description": "Updated: Annual technology conference with workshops"
    }
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Capacity updated", () => {
        pm.expect(pm.response.json().capacity).to.eql(750);
      });
    language: text/javascript
order: 4000
