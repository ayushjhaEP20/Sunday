$kind: http-request
url: "{{baseUrl}}/api/v1/events/{{eventId}}"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Correct event returned", () => {
        const json = pm.response.json();
        pm.expect(json.eventId).to.eql(pm.collectionVariables.get("eventId"));
      });
    language: text/javascript
order: 3000
