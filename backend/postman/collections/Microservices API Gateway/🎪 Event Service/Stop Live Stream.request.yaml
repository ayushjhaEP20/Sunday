$kind: http-request
url: "{{baseUrl}}/api/v1/events/{{eventId}}/stream/stop"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "streamId": "{{streamId}}"
    }
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Stream stopped", () => {
        pm.expect(pm.response.json().status).to.eql("stopped");
      });
    language: text/javascript
order: 9000
