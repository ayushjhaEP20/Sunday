$kind: http-request
url: "{{baseUrl}}/api/v1/events/{{eventId}}/participants"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "userId": "overflow-user-999",
      "role": "attendee",
      "ticketType": "general"
    }
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: beforeRequest
    code: >-
      // Simulate capacity exceeded scenario

      pm.collectionVariables.set("eventId",
      pm.collectionVariables.get("eventId") || "mock-full-event-id");
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status is 422 or 400", () => {
        pm.expect(pm.response.code).to.be.oneOf([400, 422]);
      });
      pm.test("Capacity error message", () => {
        const json = pm.response.json();
        pm.expect(json.error).to.match(/capacity|limit|full/i);
      });
    language: text/javascript
order: 12000
