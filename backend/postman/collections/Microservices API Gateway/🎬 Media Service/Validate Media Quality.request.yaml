$kind: http-request
url: "{{baseUrl}}/api/v1/media/assets/{{mediaAssetId}}/validate"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "requiredResolution": "1080p",
      "maxDurationSeconds": 7200,
      "allowedFormats": ["mp4", "mov", "webm"]
    }
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Validation result present", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("isValid");
        pm.expect(json).to.have.property("qualityScore");
      });
    language: text/javascript
order: 5000
