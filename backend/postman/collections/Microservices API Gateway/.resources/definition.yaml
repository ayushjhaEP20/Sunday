$kind: collection
description: >-
  # Microservices API Gateway Collection


  This collection provides a comprehensive test suite for a microservices-based
  API Gateway architecture. It covers five core services:


  ## Architecture Overview

  - **Auth Service** – JWT-based authentication (register, login, refresh,
  logout)

  - **Event Service** – Full event lifecycle including live streaming and
  participant management

  - **Revenue Engine** – SKU pricing, purchase flows, entitlements, and Stripe
  webhook handling

  - **Media Service** – File upload, storage quota, and quality validation

  - **Analytics Service** – Real-time and historical metrics, report export


  ## Request Chaining Flow

  1. **Register** a user → saves `userId`

  2. **Login** → saves `authToken` and `refreshToken`

  3. **Create Event** → saves `eventId`

  4. **Register Participant** → saves `participantId`

  5. **Initiate Purchase** → saves `purchaseId`

  6. **Upload Media** → saves `mediaAssetId`

  7. Use saved variables in downstream requests automatically


  ## How to Use

  1. Set the `gateway_url` environment variable to your API Gateway base URL
  (e.g., `http://localhost:3000`)

  2. Run the **Auth Service** folder first to obtain tokens

  3. Proceed through each service folder in order

  4. Negative test cases are clearly marked with `[NEGATIVE]` prefix


  ## Prerequisites

  - A running API Gateway instance

  - Valid environment with `gateway_url` set

  - Stripe test keys configured (for webhook tests)
variables:
