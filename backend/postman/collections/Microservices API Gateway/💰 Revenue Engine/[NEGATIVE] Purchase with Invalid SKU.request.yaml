$kind: http-request
url: "{{baseUrl}}/api/v1/revenue/purchases"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "userId": "{{userId}}",
      "skuId": "INVALID-SKU-999",
      "paymentMethod": "card"
    }
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 404 Not Found", () => pm.response.to.have.status(404));
      pm.test("SKU not found error", () => {
        pm.expect(pm.response.json().error).to.match(/sku|not found/i);
      });
    language: text/javascript
order: 9000
