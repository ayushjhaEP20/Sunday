$kind: http-request
url: "{{baseUrl}}/api/v1/revenue/webhooks/stripe"
method: POST
headers:
  Content-Type: application/json
  Stripe-Signature: t=1234567890,v1=mock_signature_hash
body:
  type: json
  content: |-
    {
      "id": "evt_mock_001",
      "type": "payment_intent.succeeded",
      "data": {
        "object": {
          "id": "pi_mock_001",
          "amount": 4999,
          "currency": "usd",
          "status": "succeeded",
          "metadata": {
            "userId": "{{userId}}",
            "skuId": "{{skuId}}",
            "eventId": "{{eventId}}"
          }
        }
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Webhook accepted (200 or 204)", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
    language: text/javascript
order: 7000
