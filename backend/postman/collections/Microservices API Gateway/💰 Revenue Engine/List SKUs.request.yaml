$kind: http-request
url: "{{baseUrl}}/api/v1/revenue/skus"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("SKUs array returned", () => {
        const json = pm.response.json();
        pm.expect(json.skus).to.be.an("array");
        if (json.skus.length > 0) {
          pm.collectionVariables.set("skuId", json.skus[0].skuId);
        }
      });
    language: text/javascript
order: 1000
