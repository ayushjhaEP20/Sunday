$kind: http-request
url: "{{baseUrl}}/api/v1/analytics/dashboard/realtime?eventId={{eventId}}"
method: GET
headers:
  Content-Type: application/json
queryParams:
  eventId: "{{eventId}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Real-time data returned", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("liveViewers");
        pm.expect(json).to.have.property("timestamp");
      });
    language: text/javascript
order: 4000
