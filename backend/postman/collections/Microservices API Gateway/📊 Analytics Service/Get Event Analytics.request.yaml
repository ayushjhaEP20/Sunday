$kind: http-request
url: "{{baseUrl}}/api/v1/analytics/events/{{eventId}}"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Analytics data returned", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("totalViews");
        pm.expect(json).to.have.property("uniqueAttendees");
        pm.expect(json).to.have.property("peakConcurrentViewers");
      });
    language: text/javascript
order: 1000
