$kind: http-request
url: "{{baseUrl}}/api/v1/analytics/reports/export"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "eventId": "{{eventId}}",
      "format": "csv",
      "metrics": ["attendance", "revenue", "engagement"],
      "dateRange": { "from": "2026-01-01", "to": "2026-12-31" }
    }
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 202", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 202]);
      });
      pm.test("Report download URL or job ID returned", () => {
        const json = pm.response.json();
        pm.expect(json).to.satisfy(j => j.downloadUrl || j.jobId);
      });
    language: text/javascript
order: 5000
