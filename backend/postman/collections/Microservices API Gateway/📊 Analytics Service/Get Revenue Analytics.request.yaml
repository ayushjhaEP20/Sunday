$kind: http-request
url: "{{baseUrl}}/api/v1/analytics/revenue?eventId={{eventId}}&period=30d"
method: GET
headers:
  Content-Type: application/json
queryParams:
  eventId: "{{eventId}}"
  period: 30d
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Revenue metrics returned", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("totalRevenue");
        pm.expect(json).to.have.property("transactionCount");
        pm.expect(json).to.have.property("averageOrderValue");
      });
    language: text/javascript
order: 2000
