apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: default
data:
  db_host: postgres
  db_port: "5432"
  db_name: sunday_db
  redis_host: redis
  redis_port: "6379"
  log_level: "info"
  allowed_origins: "https://example.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secrets
  namespace: default
type: Opaque
stringData:
  db_password: changeme
  jwt_secret: your-super-secret-key-here
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: default
